openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Notes App API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: health
    description: Health operations
  - name: folders
    description: Folder operations
  - name: notes
    description: Note operations
  - name: vault
    description: Vault operations
  - name: tags
    description: Tag operations
  - name: ai
    description: AI assistant operations
  - name: smart-folders
    description: Smart folder operations
  - name: quick-bits
    description: Quick Bit operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /folders:
    get:
      operationId: getFolders
      tags: [folders]
      summary: List all folders
      responses:
        "200":
          description: List of folders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Folder"
    post:
      operationId: createFolder
      tags: [folders]
      summary: Create a folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFolderBody"
      responses:
        "201":
          description: Created folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Folder"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /folders/{id}:
    patch:
      operationId: updateFolder
      tags: [folders]
      summary: Update a folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFolderBody"
      responses:
        "200":
          description: Updated folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Folder"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteFolder
      tags: [folders]
      summary: Delete a folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes:
    get:
      operationId: getNotes
      tags: [notes]
      summary: List notes with optional filters
      parameters:
        - name: folderId
          in: query
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: pinned
          in: query
          schema:
            type: ["boolean", "null"]
        - name: favorite
          in: query
          schema:
            type: ["boolean", "null"]
        - name: tag
          in: query
          schema:
            type: ["string", "null"]
        - name: sortBy
          in: query
          schema:
            type: ["string", "null"]
            enum: ["updatedAt", "createdAt", "title", null]
        - name: sortDir
          in: query
          schema:
            type: ["string", "null"]
            enum: ["asc", "desc", null]
        - name: deleted
          in: query
          schema:
            type: ["boolean", "null"]
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
    post:
      operationId: createNote
      tags: [notes]
      summary: Create a note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteBody"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes/{id}:
    get:
      operationId: getNote
      tags: [notes]
      summary: Get a single note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateNote
      tags: [notes]
      summary: Update a note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNoteBody"
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteNote
      tags: [notes]
      summary: Delete a note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes/{id}/delete:
    patch:
      operationId: softDeleteNote
      tags: [notes]
      summary: Soft-delete a note (moves to Recently Deleted)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Soft-deleted note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes/{id}/restore:
    patch:
      operationId: restoreNote
      tags: [notes]
      summary: Restore a soft-deleted note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Restored note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes/{id}/permanent:
    delete:
      operationId: permanentDeleteNote
      tags: [notes]
      summary: Permanently delete a note — irreversible
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PermanentDeleteNoteBody"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]
        "400":
          description: Missing confirm flag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes/{id}/pin:
    patch:
      operationId: toggleNotePin
      tags: [notes]
      summary: Toggle note pinned status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes/{id}/favorite:
    patch:
      operationId: toggleNoteFavorite
      tags: [notes]
      summary: Toggle note favorite status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes/{id}/move:
    patch:
      operationId: moveNote
      tags: [notes]
      summary: Move note to a different folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveNoteBody"
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes/{id}/vault:
    patch:
      operationId: toggleNoteVault
      tags: [notes]
      summary: Move a note in or out of the vault
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleNoteVaultBody"
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vault/setup:
    post:
      operationId: setupVault
      tags: [vault]
      summary: Set up vault with a password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultSetupBody"
      responses:
        "200":
          description: Vault configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultStatusResponse"
        "409":
          description: Vault already configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vault/unlock:
    post:
      operationId: unlockVault
      tags: [vault]
      summary: Unlock the vault with a password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultUnlockBody"
      responses:
        "200":
          description: Vault unlocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultUnlockResponse"
        "401":
          description: Wrong password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Vault not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vault/status:
    get:
      operationId: getVaultStatus
      tags: [vault]
      summary: Check if vault is configured
      responses:
        "200":
          description: Vault status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultStatusResponse"

  /vault/change-password:
    post:
      operationId: changeVaultPassword
      tags: [vault]
      summary: Change vault password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultChangePasswordBody"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultStatusResponse"
        "401":
          description: Wrong current password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /smart-folders:
    get:
      operationId: getSmartFolders
      tags: [smart-folders]
      summary: List all smart folders
      responses:
        "200":
          description: List of smart folders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SmartFolder"
    post:
      operationId: createSmartFolder
      tags: [smart-folders]
      summary: Create a smart folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSmartFolderBody"
      responses:
        "201":
          description: Created smart folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmartFolder"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /smart-folders/{id}:
    patch:
      operationId: updateSmartFolder
      tags: [smart-folders]
      summary: Update a smart folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSmartFolderBody"
      responses:
        "200":
          description: Updated smart folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmartFolder"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSmartFolder
      tags: [smart-folders]
      summary: Delete a smart folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /quick-bits:
    get:
      operationId: getQuickBits
      tags: [quick-bits]
      summary: List all Quick Bits for the current user
      parameters:
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: sortBy
          in: query
          schema:
            type: ["string", "null"]
            enum: ["updatedAt", "createdAt", "expiresAt", "title", null]
        - name: sortDir
          in: query
          schema:
            type: ["string", "null"]
            enum: ["asc", "desc", null]
      responses:
        "200":
          description: List of Quick Bits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetQuickBitsResponse"
    post:
      operationId: createQuickBit
      tags: [quick-bits]
      summary: Create a Quick Bit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuickBitBody"
      responses:
        "201":
          description: Created Quick Bit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuickBit"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /quick-bits/settings:
    get:
      operationId: getQuickBitSettings
      tags: [quick-bits]
      summary: Get the current user's Quick Bit settings
      responses:
        "200":
          description: Quick Bit settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuickBitSettings"
    patch:
      operationId: updateQuickBitSettings
      tags: [quick-bits]
      summary: Update Quick Bit settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuickBitSettingsBody"
      responses:
        "200":
          description: Updated Quick Bit settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuickBitSettings"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /quick-bits/{id}:
    get:
      operationId: getQuickBit
      tags: [quick-bits]
      summary: Get a single Quick Bit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quick Bit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuickBit"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateQuickBit
      tags: [quick-bits]
      summary: Update a Quick Bit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuickBitBody"
      responses:
        "200":
          description: Updated Quick Bit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuickBit"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteQuickBit
      tags: [quick-bits]
      summary: Delete a Quick Bit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted Quick Bit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuickBit"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tags:
    get:
      operationId: getTags
      tags: [tags]
      summary: Get all unique tags used across notes
      responses:
        "200":
          description: List of tag strings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /ai/complete:
    post:
      operationId: aiComplete
      tags: [ai]
      summary: Send a prompt to an AI model and get a completion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiCompleteBody"
      responses:
        "200":
          description: AI completion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiCompleteResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: AI error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      schema:
        type: string
    SessionCookie:
      name: session
      in: cookie
      required: false
      schema:
        type: string
  schemas:
    AuthUser:
      type: object
      required: [id]
      properties:
        id:
          type: string
        email:
          type: ['string', 'null']
        firstName:
          type: ['string', 'null']
        lastName:
          type: ['string', 'null']
        profileImageUrl:
          type: ['string', 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Folder:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        parentId:
          type: ["integer", "null"]
        color:
          type: ["string", "null"]
        icon:
          type: ["string", "null"]
        tagRules:
          type: array
          items:
            type: string
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - parentId
        - color
        - icon
        - tagRules
        - sortOrder
        - createdAt
        - updatedAt

    CreateFolderBody:
      type: object
      properties:
        name:
          type: string
        parentId:
          type: ["integer", "null"]
        color:
          type: ["string", "null"]
        icon:
          type: ["string", "null"]
        tagRules:
          type: array
          items:
            type: string
        sortOrder:
          type: integer
      required:
